<style>
  /* นำปุ่มลูกศรขึ้น-ลง (Spinner) ออกจากช่องกรอกตัวเลข */
  input[type=number]::-webkit-inner-spin-button, 
  input[type=number]::-webkit-outer-spin-button { 
    -webkit-appearance: none; 
    margin: 0; 
  }
  input[type=number] {
    -moz-appearance: textfield; /* สำหรับ Firefox */
  }
  
  /* แอนิเมชันสำหรับ Accordion */
  .accordion-content {
    transition: max-height 0.4s ease-in-out, opacity 0.4s ease-in-out;
    max-height: 0;
    opacity: 0;
    overflow: hidden;
  }
  .accordion-content.expanded {
    max-height: 1000px; /* ค่าเผื่อไว้สำหรับการขยาย */
    opacity: 1;
  }

  /* ตกแต่งตาราง Test Item Modal แบบสลับสี (Zebra Striping) */
  #testItemsModalTableBody tr:nth-child(even) {
    background-color: #f8fafc; /* bg-slate-50 */
  }
  #testItemsModalTableBody tr:hover {
    background-color: #f1f5f9 !important; /* bg-slate-100 */
  }
</style>

<script>
  /**
   * Quality Assessment Manager - AI Core v0.3.1
   * Frontend Script (JavaScript) - Ultra Performance Edition (Fixed Version)
   * พัฒนาระบบ Pre-fetching ลดเวลาการโหลด ปรับสูตรวิเคราะห์ %Bias และแก้ไขระบบประสานสิทธิ์ AI
   */

  // ==========================================
  // 1. Global State Management
  // ==========================================
  const state = {
    // System State
    currentDeptName: '',  // แผนกที่กำลังเลือกใช้งาน
    tempDeptSheets: {},   // ข้อมูล Mapping Sheet ID ชั่วคราว (ใช้ในหน้า Settings)
    chartDisplayMode: 'ALL', // โหมดการแสดงผลของกราฟแดชบอร์ดหลัก (ALL, IQC, EQA)
    top5DisplayMode: 'EQA',  // โหมดแสดง Top 5 OUT
    
    // Core Data (Pre-loaded in Memory)
    users: [],
    eqaMaster: [], 
    iqcMaster: [],
    currentTests: [], 
    dashboardData: [],     // เก็บข้อมูลบันทึก EQA ทั้งหมดของแผนก
    dashboardStats: null, // เก็บข้อมูลสถิติที่ประมวลผลสำหรับ Dashboard
    monitoringData: null, 
    
    // Chart Objects
    accuracyChart: null,  
    precisionChart: null, 
    dashboardChart: null,
    
    // EQA State
    aiFile: null,      
    aiBase64: null,    
    currentFileUrl: '',
    uploadingCertInfo: null, 
    uploadingFmInfo: null,
    
    // IQC State
    iqcAiFile: null,
    iqcAiBase64: null,
    currentIqcLevels: 1,      
    currentIqcLevelFilter: 1, 
    currentPreLevelFilter: 1  
  };

  // ==========================================
  // 2. Initialization & Lifecycle
  // ==========================================
  window.addEventListener('DOMContentLoaded', () => {
    switchView('dashboard');
    initApp();
    
    document.getElementById('toggleSidebar').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('sidebar-collapsed');
    });

    initDragAndDropHelper('dropZone', 'pdfFileInput', processSelectedFile, ['border-brand-600', 'bg-brand-100/50']);
    initDragAndDropHelper('iqcDropZone', 'iqcPdfFileInput', processIQCSelectedFile, ['border-blue-600', 'bg-blue-100/50']);
    
    setupYearDropdowns();

    // [กู้คืนแก้ไขบั๊กข้อ 1.3 & 2]: ยกเลิกการหมุนสกอร์ล้อเมาส์แล้วค่าตัวเลขเปลี่ยนบนกล่องกรอกแล็บ
    document.addEventListener('wheel', function(e) {
      if (document.activeElement && document.activeElement.type === 'number') {
        document.activeElement.blur(); // นำโฟกัสออกจากช่องกรอกทันทีเพื่อป้องกันค่าสลับเลื่อน
      }
    });
  });

  function normalizeYear(y) {
    if (!y) return '';
    const parsed = parseInt(y, 10);
    return isNaN(parsed) ? String(y).trim() : String(parsed);
  }

  function initApp() {
    google.script.run
      .withSuccessHandler(res => {
        if (res.success && res.data.length > 0) {
          const select = document.getElementById('globalDepartmentSelect');
          select.innerHTML = '<option value="">-- เลือกแผนก --</option>';
          res.data.forEach(dept => {
            select.insertAdjacentHTML('beforeend', `<option value="${dept}">${dept}</option>`);
          });
          
          hideGlobalLoader();
          
          Swal.fire({
            icon: 'info',
            title: 'ระบบ QA Manager',
            text: 'กรุณาเลือกแผนกห้องปฏิบัติการจากเมนูด้านซ้าย',
            confirmButtonColor: '#14b8a6',
            allowOutsideClick: false,
            customClass: { popup: 'rounded-3xl', icon: 'custom-swal-icon' }
          }).then(() => {
            checkWelcomeAndShowOverlay();
          });
        } else {
          document.getElementById('globalDepartmentSelect').innerHTML = '<option value="">-- ยังไม่ได้ตั้งค่าฐานข้อมูล --</option>';
          hideGlobalLoader();
          Swal.fire({
            icon: 'warning',
            title: 'ยังไม่ได้ตั้งค่าระบบ',
            text: 'กรุณาเข้าสู่โหมดผู้ดูแลระบบ (Dev Mode) เพื่อทำการกำหนดฐานข้อมูลระบบก่อนครับ',
            confirmButtonColor: '#14b8a6',
            customClass: { popup: 'rounded-3xl', icon: 'custom-swal-icon' }
          });
        }
      })
      .withFailureHandler(err => {
        hideGlobalLoader();
        showError('โหลดรายชื่อแผนกล้มเหลว', err.message);
      })
      .getAvailableDepartments();
  }

  function checkWelcomeAndShowOverlay() {
    const overlay = document.getElementById('deptOverlay');
    const deptContainer = document.getElementById('deptSelectContainer');
    const deptSelect = document.getElementById('globalDepartmentSelect');
    
    if (!state.currentDeptName) {
      overlay.classList.remove('hidden');
      deptContainer.style.zIndex = '90';
      deptContainer.classList.add('bg-white', 'rounded-2xl', 'p-4', 'shadow-2xl', 'border', 'border-teal-300');
      deptSelect.classList.add('ring-4', 'ring-teal-400', 'animate-pulse');
      
      document.querySelectorAll('nav button').forEach(btn => {
        btn.disabled = true;
        btn.style.opacity = '0.5';
        btn.style.cursor = 'not-allowed';
      });
    } else {
      overlay.classList.add('hidden');
      deptContainer.style.zIndex = '';
      deptContainer.className = 'px-4 py-3 border-b border-white/50 bg-white/20 shrink-0 transition-all duration-300 relative';
      deptSelect.classList.remove('ring-4', 'ring-teal-400', 'animate-pulse');
      
      document.querySelectorAll('nav button').forEach(btn => {
        btn.disabled = false;
        btn.style.opacity = '';
        btn.style.cursor = '';
      });
    }
  }

  // โหลดข้อมูลแบบ Pre-fetch รวดเดียวเก็บเข้า State Memory RAM ฝั่ง Client
  function handleDepartmentSelect() {
    const select = document.getElementById('globalDepartmentSelect');
    state.currentDeptName = select.value;
    
    if (!state.currentDeptName) {
       clearAllDashboards();
       checkWelcomeAndShowOverlay();
       return;
    }
    
    checkWelcomeAndShowOverlay();
    loadAllDepartmentDataCore(true); 
  }

  function refreshData() {
    if (!checkDeptSelected()) return;
    loadAllDepartmentDataCore(false);
  }

  function loadAllDepartmentDataCore(isChangingDept) {
    showGlobalLoader(); // โชว์ Dot Grid แบบใส
    
    google.script.run
      .withSuccessHandler((res) => {
        hideGlobalLoader();
        if (res.success) {
          // เก็บข้อมูลทั้งหมดลง Memory RAM ฝั่ง Client
          state.users = res.dependencies.users;
          state.eqaMaster = res.dependencies.eqaData;
          state.iqcMaster = res.dependencies.iqcData || [];
          state.dashboardData = res.eqaSummary.data || [];
          state.monitoringData = res.monitoring;
          state.dashboardStats = res.dashboard;
          
          populateInitialDropdowns();
          
          // Re-render ทันทีโดยไม่ต้อง Load ซ้ำ
          buildDashboardUI();
          filterDashboard(); // EQA page
          renderIQC();
          renderPrecision();
          renderAccuracy();

          if(!isChangingDept) {
            Swal.fire({
              toast: true, position: 'top-end', icon: 'success', title: 'ดึงข้อมูลล่าสุดเรียบร้อย',
              showConfirmButton: false, timer: 2000, timerProgressBar: true, customClass: { icon: 'custom-swal-icon' }
            });
          }
        } else {
          showError('โหลดข้อมูลล้มเหลว', res.message);
        }
      })
      .withFailureHandler((err) => {
        hideGlobalLoader();
        showError('ข้อผิดพลาดเครือข่าย', err.message);
      })
      .loadAllDepartmentData(state.currentDeptName);
  }

  function checkDeptSelected() {
    if (!state.currentDeptName) {
      Swal.fire({
        icon: 'warning',
        title: 'ยังไม่ได้เลือกแผนกปฏิบัติงาน',
        text: 'กรุณาเลือกกลุ่มงาน/แผนกที่ปฏิบัติงานที่แถบ Sidebar ด้านซ้ายก่อนทำรายการครับ',
        confirmButtonColor: '#14b8a6',
        customClass: { popup: 'rounded-3xl', icon: 'custom-swal-icon' }
      });
      return false;
    }
    return true;
  }

  function clearAllDashboards() {
    state.dashboardData = [];
    state.monitoringData = null;
    state.dashboardStats = null;
    
    // เคลียร์ EQA Table Body
    const tbody = document.getElementById('eqaDashboardTableBody');
    if (tbody) tbody.innerHTML = '';
    
    const emptyState = document.getElementById('eqaDashboardEmptyState');
    if (emptyState) {
      emptyState.classList.remove('hidden');
      emptyState.classList.add('flex');
      
      const emptyTitle = document.getElementById('eqaDashboardEmptyTitle');
      const emptyDesc = document.getElementById('eqaDashboardEmptyDesc');
      if (emptyTitle) emptyTitle.textContent = 'กรุณาเลือกแผนกปฏิบัติงานก่อนนะครับ';
      if (emptyDesc) emptyDesc.textContent = 'เลือกแผนกห้องปฏิบัติการของคุณเพื่อเริ่มวิเคราะห์ระบบประกันคุณภาพทางวิทยาศาสตร์';
    }
  }

  function showGlobalLoader() {
    const loader = document.getElementById('globalLoader');
    if(loader) {
       loader.style.display = 'flex';
       // บังคับ Re-flow เพื่อให้ CSS Transition ทำงาน
       void loader.offsetWidth;
       loader.style.opacity = '1';
    }
  }

  function hideGlobalLoader() {
    const loader = document.getElementById('globalLoader');
    if(loader) {
       loader.style.opacity = '0';
       setTimeout(() => loader.style.display = 'none', 300);
    }
  }

  // ==========================================
  // 3. Navigation & Views & Dev Mode
  // ==========================================
  function switchView(viewId) {
    document.querySelectorAll('.view-section').forEach(el => {
      el.classList.add('hidden');
      el.classList.remove('block');
    });

    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.remove('bg-white/60', 'shadow-sm', 'border', 'border-white', 'text-brand-700', 'text-blue-700');
      if (el.id !== 'btnEnterDev' && !el.closest('#monitoringSubMenu')) {
        el.classList.add('text-slate-500', 'hover:bg-white/40');
      } else if (el.closest('#monitoringSubMenu')) {
        el.classList.remove('bg-white/60', 'text-brand-600', 'text-blue-600');
      }
    });

    const targetView = document.getElementById(`view-${viewId}`);
    if (targetView) {
      targetView.classList.remove('hidden');
      targetView.classList.add('block');
    }

    const targetNav = document.getElementById(`nav-${viewId}`);
    if (targetNav) {
      const activeColorText = viewId === 'iqc' ? 'text-blue-700' : 'text-brand-700';
      const activeHoverText = viewId === 'iqc' ? 'text-blue-600' : 'text-blue-600';
      
      if (targetNav.closest('#monitoringSubMenu')) {
        targetNav.classList.add('bg-white/60', activeHoverText);
      } else {
        targetNav.classList.add('bg-white/60', 'shadow-sm', 'border', 'border-white', activeColorText);
        targetNav.classList.remove('text-slate-500', 'hover:bg-white/40');
      }
    }

    const navMonitoring = document.getElementById('nav-monitoring-parent');
    if (navMonitoring) {
      if (['accuracy', 'precision'].includes(viewId)) {
        navMonitoring.classList.add('bg-white/60', 'shadow-sm', 'border', 'border-white', 'text-brand-700');
        navMonitoring.classList.remove('text-slate-500', 'hover:bg-white/40');
      } else {
        navMonitoring.classList.remove('bg-white/60', 'shadow-sm', 'border', 'border-white', 'text-brand-700');
        navMonitoring.classList.add('text-slate-500', 'hover:bg-white/40');
      }
    }

    if (viewId === 'settings') return;
    if (!state.currentDeptName) return;

    // การเปลี่ยนหน้าจะทำการสลับข้อมูลทันทีจาก Memory แบบไร้รอยต่อ (Instant)
    if (viewId === 'dashboard') {
      buildDashboardUI();
    } else if (viewId === 'eqa') {
      document.getElementById('searchDashboard').value = '';
      filterDashboard();
    } else if (viewId === 'accuracy') {
      renderAccuracy();
      setTimeout(() => { if (!document.getElementById('accuracyGraphMode').classList.contains('hidden')) renderAccuracyGraph(); }, 100);
    } else if (viewId === 'precision') {
      renderPrecision();
      setTimeout(() => { if (!document.getElementById('precisionGraphMode').classList.contains('hidden')) renderPrecisionGraph(); }, 100);
    } else if (viewId === 'iqc') {
      renderIQC();
    }
  }

  function toggleMonitoringMenu() {
    const subMenu = document.getElementById('monitoringSubMenu');
    const chevron = document.getElementById('monitoringChevron');
    const isHidden = subMenu.classList.contains('hidden');
    
    subMenu.classList.toggle('hidden', !isHidden);
    subMenu.classList.toggle('flex', isHidden);
    chevron.classList.toggle('rotate-180', isHidden);
  }

  function promptSettings() {
    Swal.fire({
      title: '<span class="text-slate-800 text-xl font-bold">สิทธิ์การเข้าถึงโหมดควบคุม</span>',
      html: '<p class="text-sm text-slate-500 mb-4">ระบบป้องกันความปลอดภัยระดับโรงพยาบาล <br>กรุณาระบุรหัสผ่านผู้ดูแลระบบ</p>',
      input: 'password',
      inputPlaceholder: 'รหัสผ่าน',
      icon: 'lock',
      iconColor: '#14b8a6',
      showCancelButton: true,
      confirmButtonText: 'เข้าสู่ระบบ',
      cancelButtonText: 'ยกเลิก',
      confirmButtonColor: '#14b8a6',
      customClass: {
        popup: 'rounded-3xl',
        input: 'rounded-xl border-slate-200 focus:ring-brand-500 focus:border-brand-500',
        icon: 'custom-swal-icon'
      },
      preConfirm: (password) => {
        if (!password) Swal.showValidationMessage('กรุณาใส่รหัสผ่าน');
        return password;
      }
    }).then((result) => {
      if (result.isConfirmed) {
        showGlobalLoader();
        google.script.run
          .withSuccessHandler(isValid => {
            if (isValid) {
              hideGlobalLoader();
              document.getElementById('btnEnterDev').classList.add('hidden');
              const devSection = document.getElementById('devModeSection');
              devSection.classList.remove('hidden');
              devSection.classList.add('flex');
              
              switchView('settings');
              loadSettings();
            } else {
              hideGlobalLoader();
              Swal.fire({ icon: 'error', title: 'รหัสผ่านไม่ถูกต้อง', text: 'ปฏิเสธการเข้าถึงเนื่องจากสิทธิ์ไม่ได้รับอนุญาต', confirmButtonColor: '#14b8a6', customClass: { popup: 'rounded-3xl', icon: 'custom-swal-icon' } });
            }
          })
          .verifySettingsPassword(result.value);
      }
    });
  }

  function exitDevMode() {
    document.getElementById('devModeSection').classList.add('hidden');
    document.getElementById('devModeSection').classList.remove('flex');
    document.getElementById('btnEnterDev').classList.remove('hidden');
    switchView('dashboard');
    Swal.fire({
      toast: true, position: 'top-end', icon: 'success', title: 'ออกจากโหมดผู้ดูแลระบบเรียบร้อย',
      showConfirmButton: false, timer: 3000, timerProgressBar: true, customClass: { icon: 'custom-swal-icon' }
    });
  }

  // ==========================================
  // 4. Settings & API Management
  // ==========================================
  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    icon.classList.toggle('fa-eye', !isPassword);
    icon.classList.toggle('fa-eye-slash', isPassword);
  }

  function loadSettings() {
    showGlobalLoader();
    google.script.run
      .withSuccessHandler(res => {
        document.getElementById('settingMainSheetId').value = res.mainSheetId || '';
        document.getElementById('settingApiKey').value = res.apiKey || '';
        state.tempDeptSheets = res.deptSheets || {}; 
        
        google.script.run
          .withSuccessHandler(modelsRes => {
            hideGlobalLoader();
            if (modelsRes.success) {
              updateSelectOptions('settingModel', modelsRes.data, '-- เลือกโมเดล Gemini --');
              document.getElementById('settingModel').value = res.model || '';
            }
          })
          .getGeminiModels();
      })
      .getSettings();
  }

  function loadDepartmentsForMapping() {
    const mainSheetId = document.getElementById('settingMainSheetId').value.trim();
    if (!mainSheetId) {
       return showError('ข้อมูลไม่ครบถ้วน', 'กรุณาระบุ Main Sheet ID ก่อนทำการประมวลผลเพื่อความปลอดภัย');
    }

    showGlobalLoader();
    google.script.run
      .withSuccessHandler(res => {
          if(!res.success) {
            hideGlobalLoader();
            return showError('ข้อผิดพลาด', 'ไม่สามารถเข้าถึงฐานข้อมูลหลักได้');
          }
          
          google.script.run
            .withSuccessHandler(unitsRes => {
               hideGlobalLoader();
               if(unitsRes.success) {
                  renderDepartmentMappingInputs(unitsRes.data);
                  Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: `สแกนแผนกปฏิบัติงานเรียบร้อย (${unitsRes.data.length} แผนก)`, showConfirmButton: false, timer: 3000, customClass: { icon: 'custom-swal-icon' }});
               } else {
                  showError('ดึงข้อมูลล้มเหลว', unitsRes.message);
               }
            })
            .withFailureHandler(err => { hideGlobalLoader(); showError('ข้อผิดพลาดเครือข่าย', err.message); })
            .getUnitsList();
      })
      .saveSettings({ mainSheetId: mainSheetId }); 
  }

  function renderDepartmentMappingInputs(unitsArray) {
    const container = document.getElementById('deptMappingContainer');
    container.innerHTML = '';
    
    if(!unitsArray || unitsArray.length === 0) {
       container.innerHTML = `
        <div class="text-center py-8 bg-slate-50/50 rounded-xl border border-slate-200 border-dashed">
          <i class="fa-solid fa-folder-open text-slate-300 text-2xl mb-2"></i>
          <p class="text-sm text-slate-500">ไม่พบรายชื่อแผนกปฏิบัติงานในฐานข้อมูล</p>
        </div>`;
       return;
    }

    unitsArray.forEach(unit => {
        const val = state.tempDeptSheets[unit] || '';
        const html = `
          <div class="bg-white/80 p-3 rounded-xl border border-slate-200 shadow-sm flex flex-col md:flex-row md:items-center gap-3 animate-fade-in">
            <div class="md:w-1/3 flex items-center gap-2 text-slate-700 font-medium text-sm">
               <i class="fa-solid fa-microscope text-brand-500 opacity-70"></i> ${unit}
            </div>
            <div class="md:w-2/3">
               <input type="text" data-dept="${unit}" class="dept-mapping-input block w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:ring-2 focus:ring-brand-500 focus:border-brand-500 transition-all font-mono placeholder:font-sans" placeholder="ระบุ Google Sheet ID เฉพาะแผนกนี้..." value="${val}">
            </div>
          </div>
        `;
        container.insertAdjacentHTML('beforeend', html);
    });
  }

  function saveSettingsForm() {
    const deptInputs = document.querySelectorAll('.dept-mapping-input');
    const newDeptSheets = {};
    deptInputs.forEach(input => {
        const val = input.value.trim();
        const dept = input.getAttribute('data-dept');
        if (dept && val) {
            newDeptSheets[dept] = val;
        }
    });

    const payload = {
      mainSheetId: document.getElementById('settingMainSheetId').value.trim(),
      apiKey: document.getElementById('settingApiKey').value.trim(),
      model: document.getElementById('settingModel').value,
      deptSheets: newDeptSheets
    };

    if (!payload.mainSheetId) return showError('ข้อมูลไม่ครบถ้วน', 'กรุณาระบุ Main Google Sheet ID เพื่อเป็นศูนย์กลางการตรวจสอบ');

    showGlobalLoader();
    google.script.run
      .withSuccessHandler(res => {
        hideGlobalLoader();
        if (res.success) {
          Swal.fire({ icon: 'success', title: 'สำเร็จ', text: res.message, confirmButtonColor: '#14b8a6', customClass: { popup: 'rounded-3xl', icon: 'custom-swal-icon' } })
            .then(() => {
              showGlobalLoader();
              initApp(); 
              switchView('dashboard');
            });
        } else {
          showError('บันทึกไม่สำเร็จ', res.message);
        }
      })
      .saveSettings(payload);
  }

  function updateSelectOptions(elementId, dataArray, placeholder) {
    const select = document.getElementById(elementId);
    if (!select) return;
    select.innerHTML = `<option value="">${placeholder}</option>`;
    dataArray.forEach(item => {
      const option = document.createElement('option');
      option.value = item;
      option.textContent = item;
      select.appendChild(option);
    });
  }

  function populateInitialDropdowns() {
    const eqaNames = [...new Set(state.eqaMaster.map(item => item.eqaName))].filter(String).sort();
    updateSelectOptions('eqaName', eqaNames, '-- เลือก EQA --');
    updateSelectOptions('recordBy', state.users, '-- เลือกผู้บันทึก --');
    
    const iqcNames = [...new Set(state.iqcMaster.map(item => item.iqcName))].filter(String).sort();

    updateSelectOptions('iqcRecordBy', state.users, '-- เลือกผู้บันทึก --');

    populateEqaFilters();
  }

  function populateEqaFilters() {
    const eqaNames = [...new Set(state.eqaMaster.map(item => item.eqaName))].filter(String).sort();
    const eqaYears = [...new Set(state.eqaMaster.map(item => item.year))].filter(String).sort((a,b) => b - a);

      eqaNames.forEach(name => {
        filterNameSel.insertAdjacentHTML('beforeend', `<option value="${name}">${name}</option>`);

    if (filterYearSel) {

      eqaYears.forEach(yr => {
        filterYearSel.insertAdjacentHTML('beforeend', `<option value="${yr}">${yr}</option>`);
      });

  function renderDashboardTable(data, isFiltered = false) {
    const tbody = document.getElementById('eqaDashboardTableBody');
    const emptyState = document.getElementById('eqaDashboardEmptyState');
    if (!tbody || !emptyState) return;
    
    tbody.innerHTML = '';

    if (data.length === 0) {
      emptyState.classList.remove('hidden');
      emptyState.classList.add('flex');
      
      emptyState.innerHTML = isFiltered ? `
          <div class="w-24 h-24 bg-slate-100 text-slate-400 rounded-full flex items-center justify-center text-4xl mb-4 shadow-inner animate-pulse-soft">
            <i class="fa-solid fa-magnifying-glass"></i>

          <p class="text-slate-500 max-w-md">ทดลองสลับตัวคัดกรอง หรือปรับปีการประเมินใหม่อีกครั้งเพื่อทำการสแกนครับ</p>
        ` : `
          <div class="w-24 h-24 bg-brand-100 text-brand-500 rounded-full flex items-center justify-center text-4xl mb-4 shadow-inner animate-pulse-soft">
            <i class="fa-solid fa-folder-open"></i>
          </div>

          <p class="text-slate-500 max-w-md">เริ่มบันทึกผลงานประเมินคุณภาพรอบใหม่ของคุณโดยใช้ปุ่ม "บันทึกผล EQA" ด้านบน</p>
        `;
      return;
    }

    emptyState.classList.add('hidden');

    const groupedData = {};
    data.forEach(item => {
      const key = `${item.eqaName}_${item.year}`;
      if (!groupedData[key]) {
        groupedData[key] = {
          eqaName: item.eqaName,
          year: item.year,
          totalTests: 0,
          acceptableCount: 0,
          answeredCount: 0,
          criteriaAcc: item.criteriaAcc || 'ไม่ระบุเกณฑ์การผ่าน',
          records: []
        };
      }
      groupedData[key].totalTests += item.totalTests;
      groupedData[key].acceptableCount += item.acceptableCount;
      groupedData[key].answeredCount += (item.answeredCount || 0);
      groupedData[key].records.push(item);
    });

    let groupIndex = 0;
    for (const key in groupedData) {
      const group = groupedData[key];
      
      const masterInfo = state.eqaMaster.find(m => String(m.eqaName).trim() === String(group.eqaName).trim() && String(m.year).trim() === String(group.year).trim()) || {};
      const timesLimit = masterInfo.timesPerYear || 12; 
      const certUrl = masterInfo.certUrl || '';

      const overallPercent = group.totalTests > 0 ? ((group.acceptableCount / group.totalTests) * 100).toFixed(1) : "0.0";
      const overallParticipation = group.records.length > 0 ? (group.records.reduce((acc, r) => acc + (r.participationPercent || 0), 0) / group.records.length).toFixed(1) : "0.0";

      let pctClass = 'bg-red-100 text-red-700 border border-red-200';
      const pctNum = parseFloat(overallPercent);
      if (pctNum >= 80) pctClass = 'bg-brand-100 text-brand-700 border border-brand-200';
      else if (pctNum >= 50) pctClass = 'bg-yellow-100 text-yellow-700 border border-yellow-200';

      const accId = `acc_${groupIndex}`;
      group.records.sort((a, b) => parseInt(a.times) - parseInt(b.times));

      const circlesHtml = group.records.map(r => {
        let circleClass = 'bg-brand-100 border-brand-200 text-brand-700';

        <td class="py-4 px-2 border-b border-slate-100 text-center">

            <div class="absolute bottom-full mb-2.5 left-1/2 -translate-x-1/2 z-50 opacity-0 invisible group-hover/tooltip:opacity-100 group-hover/tooltip:visible transition-all duration-200 bg-slate-800 text-white text-xs py-2 px-3.5 rounded-xl shadow-xl w-52 text-center border border-slate-700">
              <div class="font-bold border-b border-slate-700 pb-1.5 mb-1.5 text-brand-300 flex items-center justify-center gap-1">

          <div class="text-[10px] text-slate-400 mt-1 font-mono">${group.acceptableCount}/${group.totalTests} Tests</div>
        </td>
        <td class="py-4 px-2 border-b border-slate-100 text-center">
          ${certHtml}

        <td class="py-4 px-4 border-b border-slate-100 text-center">
          <div class="w-8 h-8 rounded-full bg-slate-50 text-slate-400 group-hover:bg-brand-100 group-hover:text-brand-600 transition-all flex items-center justify-center mx-auto shadow-sm border border-slate-200">
            <i class="fa-solid fa-chevron-down transition-transform duration-300" id="icon_${accId}"></i>
          </div>
        </td>
      `;
      tbody.appendChild(mainTr);

      const subTr = document.createElement('tr');
      subTr.className = 'bg-slate-50/40 border-b border-slate-200';
      
      let subTableRows = '';
      group.records.forEach(item => {
        let subPctClass = 'text-red-600';
        const itemPassRate = parseFloat(item.percentAcceptable);
        if (itemPassRate >= 80) subPctClass = 'text-brand-600';
        else if (itemPassRate >= 50) subPctClass = 'text-yellow-600';

        let circleClassSub = 'bg-brand-50 border-brand-200 text-brand-700';

  function filterDashboard() {
    const nameFilter = document.getElementById('filterEqaName').value;
    const yearFilter = document.getElementById('filterEqaYear').value;
    const query = document.getElementById('searchDashboard').value.toLowerCase().trim();

    const filtered = state.dashboardData.filter(item => {
      const matchName = (nameFilter === 'ALL' || item.eqaName === nameFilter);
      const matchYear = (yearFilter === 'ALL' || normalizeYear(item.year) === normalizeYear(yearFilter));
      
      let matchQuery = true;
      if (query !== '') {
        matchQuery = (item.eqaName && item.eqaName.toLowerCase().includes(query)) ||
                     (item.year && item.year.toLowerCase().includes(query)) ||
                     (item.timestamp && item.timestamp.toLowerCase().includes(query)) ||
                     (item.times && item.times.toString().includes(query));
      }

      return matchName && matchYear && matchQuery;
    });

    renderDashboardTable(filtered, query !== '' || nameFilter !== 'ALL' || yearFilter !== 'ALL');
  }

  function toggleAccordion(id) {
    const content = document.getElementById(id);
    const icon = document.getElementById(`icon_${id}`);
    if (!content) return;
    
    const isExpanded = content.classList.contains('expanded');
    content.classList.toggle('expanded', !isExpanded);
    if(icon) icon.classList.toggle('rotate-180', !isExpanded);
  }

  function handleEQANameChange() {
    const selectedName = document.getElementById('eqaName').value;
    const yearSelect = document.getElementById('eqaYear'); 
    const lotSelect = document.getElementById('eqaLot');
    const expSelect = document.getElementById('eqaExp');

                       document.getElementById('eqaLot').value &&

  function selectEQAMode(mode) {
    document.getElementById('eqaModeSelection').classList.add('hidden');
    if (mode === 'MANUAL') {
      state.currentFileUrl = ''; 
      document.getElementById('eqaTableSection').classList.remove('hidden');
      document.getElementById('modalFooter').classList.remove('opacity-50', 'pointer-events-none');
      
      const eqaName = document.getElementById('eqaName').value;
      const testsForEqa = state.monitoringData.tests.filter(t => t.eqaName === eqaName).map(t => ({ test: t.test, unit: t.unit || '' }));
      if(testsForEqa.length > 0) {
        state.currentTests = testsForEqa;
        renderTestsTableWithData(testsForEqa.map(t => ({ test: t.test, unit: t.unit, result: '', meanTarget: '', bias: '', zScore: '', evaluation: '', remark: '' })));
      } else {
        document.getElementById('testsTableBody').innerHTML = `<tr><td colspan="8" class="py-12 text-center text-red-400"><i class="fa-solid fa-circle-exclamation text-4xl mb-3 opacity-80"></i><p>ไม่พบโครงสร้างการทดสอบที่กำหนดไว้ของโครงการ EQA ชนิดนี้ใน MetaData</p></td></tr>`;
      }
    } else if (mode === 'AI') {
      document.getElementById('eqaAiUploadSection').classList.remove('hidden');
    }
  }

  function initDragAndDropHelper(dropZoneId, fileInputId, processFn, activeClasses) {
    const dropZone = document.getElementById(dropZoneId);
    if (!dropZone) return;
    const fileInput = document.getElementById(fileInputId);

    const prevent = (e) => { e.preventDefault(); e.stopPropagation(); };
    
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      dropZone.addEventListener(eventName, prevent, false);
    });

    ['dragenter', 'dragover'].forEach(eventName => {
      dropZone.addEventListener(eventName, () => dropZone.classList.add(...activeClasses), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropZone.addEventListener(eventName, () => dropZone.classList.remove(...activeClasses), false);
    });

    dropZone.addEventListener('drop', (e) => {
      const file = e.dataTransfer.files[0];
      if (file) {
        fileInput.files = e.dataTransfer.files;
        processFn(file);
      }
    }, false);
  }

    const eqaName = document.getElementById('eqaName').value;

    const masterInfo = state.eqaMaster.find(item => item.eqaName === eqaName && item.year === year) || {};
    const folderId = masterInfo.folderId || '';
    const keyword = masterInfo.keyword || '';
    const targetData = masterInfo.targetData || '';

    document.getElementById('eqaAiUploadSection').classList.add('hidden');
    document.getElementById('eqaTableSection').classList.remove('hidden');
    
    const loader = document.getElementById('tableLoader');
    loader.classList.remove('hidden');
    loader.classList.add('flex');
    
    const standardSpinner = document.getElementById('standardTableSpinner');
    const aiAnalyzingDots = document.getElementById('aiAnalyzingDots');
    if (standardSpinner) standardSpinner.classList.add('hidden');
    if (aiAnalyzingDots) {
      aiAnalyzingDots.classList.remove('hidden');
      aiAnalyzingDots.classList.add('flex');
    }

    const progressBar = document.getElementById('aiProgressBar');
    const progressText = document.getElementById('aiProgressText');
    if (progressBar && progressText) {
      progressBar.style.width = '10%';
      progressText.innerText = '1/3 กำลังเตรียมอัปโหลดไฟล์ PDF...';
    }

    setTimeout(() => {
       if (progressBar && progressText) {
         progressBar.style.width = '45%';
         progressText.innerText = '2/3 AI กำลังวิเคราะห์และสกัดข้อมูล (อาจใช้เวลาสักครู่)...';
       }
    }, 1200);

    const testsForEqa = state.monitoringData.tests.filter(t => t.eqaName === eqaName);
    const testsList = testsForEqa.map(t => t.test);

    if(testsList.length === 0) {
      loader.classList.add('hidden'); loader.classList.remove('flex');
      showError('ไม่พบรายการทดสอบ', 'ไม่พบโครงสร้างรายการตรวจของ EQA นี้ในตารางวิเคราะห์ MetaData');
      cancelAIMode();
      return;
    }

    showGlobalLoader(); 

    google.script.run
      .withSuccessHandler(aiRes => {
        hideGlobalLoader(); 
        if(aiRes.success) {
          state.currentFileUrl = aiRes.fileUrl || '';

          if (progressBar && progressText) {
            progressBar.style.width = '100%';
            progressText.innerText = '3/3 เสร็จสมบูรณ์!';
          }

          setTimeout(() => {
            loader.classList.add('hidden'); loader.classList.remove('flex');
            
            state.currentTests = testsForEqa.map(t => ({ test: t.test, unit: t.unit || '' }));
            const mergedData = state.currentTests.map(baseTest => {
              const aiData = aiRes.data.find(a => a.test.toLowerCase() === baseTest.test.toLowerCase()) || {};
              return {
                test: baseTest.test, unit: baseTest.unit,
                result: aiData.result !== undefined && aiData.result !== "" ? aiData.result : '',
                meanTarget: aiData.meanTarget !== undefined && aiData.meanTarget !== "" ? aiData.meanTarget : '',
                bias: aiData.bias !== undefined && aiData.bias !== "" ? aiData.bias : '',
                zScore: aiData.zScore !== undefined && aiData.zScore !== "" ? aiData.zScore : '',
                evaluation: '', remark: ''
              };
            });

            renderTestsTableWithData(mergedData);

            document.querySelectorAll('#testsTableBody tr').forEach(row => {
               const resInput = row.querySelector('.row-result');
               calculateBiasAndEvaluate(resInput);
            });

            document.getElementById('modalFooter').classList.remove('opacity-50', 'pointer-events-none');
            Swal.fire({ 
              icon: 'success', 
              title: 'การอ่านด้วย AI สมบูรณ์', 
              html: 'กรุณาตรวจสอบค่าสถิติ ความเที่ยงตรง และตัวประเมินผลอีกครั้งก่อนบันทึกข้อมูลครับ', 
              timer: 3500, 
              showConfirmButton: false, 
              backdrop: `rgba(20, 184, 166, 0.1)`, 
              customClass: { popup: 'rounded-3xl', icon: 'custom-swal-icon' } 
            });
          }, 800); 

        } else {
          loader.classList.add('hidden'); loader.classList.remove('flex');
          handleAIErrorGeneric(aiRes.message, false);
        }
      })
      .withFailureHandler(err => {
        hideGlobalLoader();
        loader.classList.add('hidden'); loader.classList.remove('flex');
        handleAIErrorGeneric(err.message, false);
      })
      .processPdfWithAI(state.aiBase64, state.aiFile.name, folderId, keyword, targetData, testsList); 
  }

  function renderTestsTableWithData(testsData) {
    const tbody = document.getElementById('testsTableBody');

      tr.className = 'hover:bg-slate-50/50 transition-colors';
      
      let evalBadge = '<span class="text-slate-400 text-xs">รอกรอกผล...</span>';
      if (item.evaluation === 'Acceptable') evalBadge = '<span class="px-3 py-1 rounded-full bg-brand-100 text-brand-700 text-xs font-semibold shadow-sm border border-brand-200">Acceptable</span>';
      else if (item.evaluation === 'Warning') evalBadge = '<span class="px-3 py-1 rounded-full bg-yellow-100 text-yellow-700 text-xs font-semibold shadow-sm border border-yellow-200">Warning</span>';
      else if (item.evaluation === 'Unacceptable') evalBadge = '<span class="px-3 py-1 rounded-full bg-red-100 text-red-700 text-xs font-semibold shadow-sm border border-red-200">Unacceptable</span>';
      else if (item.remark) evalBadge = '<span class="px-3 py-1 rounded-full bg-slate-100 text-slate-500 text-xs font-semibold shadow-sm border border-slate-200">N/A</span>';

      tr.innerHTML = `
        <td class="py-3 px-4 font-medium text-slate-700 w-2/12 truncate">
          ${item.test}
          <input type="hidden" class="row-test-name" value="${item.test}">
        </td>
        <td class="py-3 px-4 text-slate-500 text-center w-1/12 truncate">${item.unit || '-'}</td>
        <td class="py-3 px-4 w-[12.5%]"><input type="number" step="any" class="row-result w-full form-input rounded-lg text-sm font-mono text-blue-700" placeholder="Result" value="${item.result}"></td>
        <td class="py-3 px-4 w-[12.5%]"><input type="number" step="any" class="row-mean w-full form-input rounded-lg text-sm font-mono text-emerald-700" placeholder="Mean/Target" value="${item.meanTarget}"></td>
        <td class="py-3 px-4 w-1/12"><input type="number" step="any" class="row-bias w-full form-input rounded-lg text-sm font-mono text-orange-600 bg-slate-50" placeholder="%Bias" value="${item.bias}"></td>
        <td class="py-3 px-4 w-1/12"><input type="number" step="any" class="row-zscore w-full form-input rounded-lg text-sm font-mono text-purple-700" placeholder="Z-score" value="${item.zScore}"></td>

      `;

  document.getElementById('testsTableBody').addEventListener('input', function(e) {
    const target = e.target;
    if (['row-result', 'row-mean', 'row-bias', 'row-zscore', 'row-remark'].some(c => target.classList.contains(c))) {
      target.classList.remove('border-red-500', 'bg-red-50');
      const row = target.closest('tr');
      row.querySelector('.row-result').classList.remove('border-red-500', 'bg-red-50');
      row.querySelector('.row-zscore').classList.remove('border-red-500', 'bg-red-50');
      row.querySelector('.row-remark').classList.remove('border-red-500', 'bg-red-50');
      calculateBiasAndEvaluate(target);
    }
  });

  function calculateBiasAndEvaluate(inputEl) {
    const row = inputEl.closest('tr');
    if (!row) return;

    const resInput = row.querySelector('.row-result');
    const meanInput = row.querySelector('.row-mean');
    const biasInput = row.querySelector('.row-bias');
    const zInput = row.querySelector('.row-zscore');
    const remarkInput = row.querySelector('.row-remark');
    const evalDisplay = row.querySelector('.eval-display');
    const evalInput = row.querySelector('.row-evaluation');

    const resValText = resInput.value;
    const meanValText = meanInput.value;
    
    if (resValText !== '' && meanValText !== '') {
       const resVal = parseFloat(resValText);
       const meanVal = parseFloat(meanValText);
       if (!isNaN(resVal) && !isNaN(meanVal) && meanVal !== 0) {
          if (document.activeElement !== biasInput) {
            const bias = ((resVal - meanVal) / meanVal) * 100;
            biasInput.value = bias.toFixed(2);
          }
       }
    }

    const zValText = zInput.value;
    if (zValText === '') {
      if (remarkInput.value.trim() !== '') {
         evalDisplay.innerHTML = '<span class="px-3 py-1 rounded-full bg-slate-100 text-slate-500 text-xs font-semibold shadow-sm border border-slate-200">N/A</span>';
      } else {
         evalDisplay.innerHTML = '<span class="text-slate-400 text-xs">รอกรอกผล...</span>';
      }
      evalInput.value = '';
      return;
    }

    const zVal = parseFloat(zValText);
    if (isNaN(zVal)) return;

    const absZ = Math.abs(zVal);
    if (absZ <= 2.0) {
      evalDisplay.innerHTML = '<span class="px-3 py-1 rounded-full bg-brand-100 text-brand-700 text-xs font-semibold shadow-sm border border-brand-200">Acceptable</span>';
      evalInput.value = 'Acceptable';
    } else if (absZ > 2.0 && absZ < 3.0) {
      evalDisplay.innerHTML = '<span class="px-3 py-1 rounded-full bg-yellow-100 text-yellow-700 text-xs font-semibold shadow-sm border border-yellow-200">Warning</span>';
      evalInput.value = 'Warning';
    } else {
      evalDisplay.innerHTML = '<span class="px-3 py-1 rounded-full bg-red-100 text-red-700 text-xs font-semibold shadow-sm border border-red-200">Unacceptable</span>';
      evalInput.value = 'Unacceptable';
    }
  }

  function submitEQAForm() {
    const currentTxid = document.getElementById('currentTxid').value;
    const payload = {
      txid: currentTxid,
      deptName: state.currentDeptName, 
      eqaName: document.getElementById('eqaName').value,
      year: document.getElementById('eqaYear').value, 
      times: document.getElementById('eqaTimes').value,
      lot: document.getElementById('eqaLot').value,
      exp: document.getElementById('eqaExp').value,
      analysisDate: document.getElementById('analysisDate').value, 
      recordBy: document.getElementById('recordBy').value,
      fileUrl: state.currentFileUrl, 
      tests: []
    };

    if (!payload.eqaName || !payload.year || !payload.times || !payload.lot || !payload.exp || !payload.analysisDate || !payload.recordBy) {
      return Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ครบถ้วน', text: 'กรุณากรอกข้อมูลส่วนหัวและระบุวันที่ตรวจวิเคราะห์รวมถึงผู้ตรวจสอบให้เรียบร้อย', confirmButtonColor: '#14b8a6', customClass: { popup: 'rounded-3xl', icon: 'custom-swal-icon' } });
    }

    const tbody = document.getElementById('testsTableBody');
    const rows = tbody.querySelectorAll('tr');
    if (rows.length === 0 || !tbody.querySelector('.row-test-name')) {
      return Swal.fire({ icon: 'warning', title: 'ไม่มีโครงสร้างการทดสอบ', text: 'ไม่พบรายการทดสอบที่ใช้ทำคะแนน', confirmButtonColor: '#14b8a6', customClass: { popup: 'rounded-3xl', icon: 'custom-swal-icon' } });
    }

    let hasError = false;
    rows.forEach(row => {
      const testNameInput = row.querySelector('.row-test-name');
      if (testNameInput) {
        const testName = testNameInput.value;
        const resultInput = row.querySelector('.row-result');
        const meanInput = row.querySelector('.row-mean');
        const biasInput = row.querySelector('.row-bias');
        const zScoreInput = row.querySelector('.row-zscore');
        const remarkInput = row.querySelector('.row-remark');
        const evalInput = row.querySelector('.row-evaluation');

        const resultVal = resultInput.value.trim();
        const zScoreVal = zScoreInput.value.trim();
        const remarkVal = remarkInput.value.trim();

        if (resultVal === '' && zScoreVal === '') {
          if (remarkVal === '') {
            hasError = true;
            resultInput.classList.add('border-red-500', 'bg-red-50');
            zScoreInput.classList.add('border-red-500', 'bg-red-50');
            remarkInput.classList.add('border-red-500', 'bg-red-50');
          } else {
             payload.tests.push({ test: testName, result: '', meanTarget: '', bias: '', zScore: '', evaluation: '', remark: remarkVal });
          }
        } else if (resultVal === '' || zScoreVal === '') {
          hasError = true;
          if (resultVal === '') resultInput.classList.add('border-red-500', 'bg-red-50');
          if (zScoreVal === '') zScoreInput.classList.add('border-red-500', 'bg-red-50');
        } else {
          payload.tests.push({
            test: testName, result: parseFloat(resultVal), meanTarget: meanInput.value.trim(),
            bias: biasInput.value.trim(), zScore: parseFloat(zScoreVal),
            evaluation: evalInput.value, remark: remarkVal
          });
        }
      }
    });

    if (hasError) return Swal.fire({ icon: 'error', title: 'ข้อมูลยังไม่ครบ', text: 'กรุณากรอกผลวิเคราะห์และ Z-Score หรือหากข้ามให้ระบุหมายเหตุทางแล็บให้ครบครับ', confirmButtonColor: '#ef4444', customClass: { popup: 'rounded-3xl', icon: 'custom-swal-icon' } });

    const actionText = currentTxid ? 'อัปเดตข้อมูลประวัติ' : 'บันทึกลงสมุดทะเบียน';
    Swal.fire({
      title: `ยืนยันการ${actionText}?`, text: `คุณกำลังทำการส่งข้อมูลแล็บ EQA จำนวน ${payload.tests.length} การทดสอบ`,
      icon: 'question', showCancelButton: true, confirmButtonColor: '#14b8a6', cancelButtonColor: '#94a3b8',
      confirmButtonText: `ใช่, ส่งบันทึก`, cancelButtonText: 'ย้อนกลับเพื่อตรวจสอบ', customClass: { popup: 'rounded-3xl', icon: 'custom-swal-icon' }
    }).then((result) => {
      if (result.isConfirmed) {
        showGlobalLoader(); 
        const serverMethod = currentTxid ? 'updateEQARecord' : 'saveEQARecord';
        google.script.run
          .withSuccessHandler(res => {
            if (res.success) {
              hideGlobalLoader();
              Swal.fire({ icon: 'success', title: 'เสร็จสมบูรณ์', html: `ลงทะเบียน EQA เรียบร้อยแล้ว`, confirmButtonColor: '#14b8a6', customClass: { popup: 'rounded-3xl', icon: 'custom-swal-icon' } }).then(() => { 
                  closeEQAModal(); 
                  loadAllDepartmentDataCore(false); 
              });
            } else { 
              hideGlobalLoader();
              showError(`${actionText}ไม่สำเร็จ`, res.message); 
            }
          })
          .withFailureHandler(err => {
              hideGlobalLoader();
              showError('ข้อผิดพลาดเครือข่าย', err.message);
          })

    const thead = document.getElementById('iqcTableHeader');

    let theadHtml = `<tr><th class="py-4 px-4 font-semibold w-[20%] border-r border-slate-200 text-slate-700">Test Name</th>`;
    for(let i=1; i<=state.currentIqcLevels; i++) {
        theadHtml += `<th class="py-4 px-2 font-semibold text-center border-r border-slate-200 header-level-${i}">Level ${i} (Mean)</th>
                      <th class="py-4 px-2 font-semibold text-center border-r border-slate-200 header-level-${i}">Level ${i} (SD)</th>
                      <th class="py-4 px-2 font-semibold text-center border-r border-slate-200 header-level-${i}">Level ${i} (%CV)</th>`;
    }
    theadHtml += `</tr>`;
    thead.innerHTML = theadHtml;
    
    tbody.innerHTML = '';
    testsData.forEach(item => {
       const tr = document.createElement('tr');
       tr.className = 'hover:bg-slate-50/50 transition-colors';
       
       let colsHtml = `<td class="py-3 px-4 font-semibold text-slate-700 border-r border-slate-100">
            ${item.test}
            <input type="hidden" class="iqc-row-test-name" value="${item.test}">
       </td>`;
       
       for(let i=1; i<=state.currentIqcLevels; i++) {
           const levelData = item[`level_${i}`] || {mean:'', sd:'', cv:''};
           colsHtml += `
             <td class="py-3 px-2 border-r border-slate-100"><input type="number" step="any" class="iqc-mean-${i} w-full form-input rounded-lg text-sm font-mono text-emerald-700 px-2" placeholder="Mean" value="${levelData.mean}"></td>
             <td class="py-3 px-2 border-r border-slate-100"><input type="number" step="any" class="iqc-sd-${i} w-full form-input rounded-lg text-sm font-mono text-orange-600 px-2" placeholder="SD" value="${levelData.sd}"></td>
             <td class="py-3 px-2 border-r border-slate-100"><input type="number" step="any" class="iqc-cv-${i} w-full form-input rounded-lg text-sm font-mono text-blue-700 px-2" placeholder="%CV" value="${levelData.cv}"></td>
           `;
       }
       tr.innerHTML = colsHtml;
       tbody.appendChild(tr);
    });
  }

  function parseTEa(teaString, targetValue) {
    if (!teaString) return 0;
    let teaPct = 0;
    let teaAbs = 0;
    
    const pctRegex = /([\d\.]+)\s*%/;
    const pctMatch = teaString.match(pctRegex);
    if (pctMatch) teaPct = parseFloat(pctMatch[1]);
    
    let tempStr = teaString.replace(pctRegex, '');
    const absMatch = tempStr.match(/([\d\.]+)/);
    if (absMatch) teaAbs = parseFloat(absMatch[1]);
    
    let calculatedPctFromAbs = 0;
    if (targetValue && targetValue !== 0 && teaAbs > 0) {
        calculatedPctFromAbs = (teaAbs / targetValue) * 100;
    }
    
    if (teaString.toLowerCase().includes('greater') || teaString.toLowerCase().includes('or')) {
        return Math.max(teaPct, calculatedPctFromAbs);
    }
    return teaPct > 0 ? teaPct : calculatedPctFromAbs;
  }

  function parseControlLimit(limitString, finalTeaPct) {
    if (!limitString) return 0;
    const match = limitString.match(/([\d\.]+)/);
    if (!match) return Math.abs(finalTeaPct); 
    
    const multiplier = parseFloat(match[1]);
    if (limitString.toLowerCase().includes('tea') || multiplier < 10) {
         return finalTeaPct * multiplier;
    }
    return multiplier;
  }

      3: { bg: 'bg-purple-500', activeHoverBg: 'hover:bg-purple-600', hoverBg: 'hover:bg-purple-50', textHover: 'hover:text-purple-600' }
    };

    [1, 2, 3].forEach(l => {

  function updatePrecisionMonitoringHeader() {
    const selectedYear = parseInt(document.getElementById('filterYearPrecision').value);
    const lvl = state.currentPreLevelFilter;
    let totalCV = 0;
    let compliantCV = 0;
    
    if (state.monitoringData && state.monitoringData.tests) {
      state.monitoringData.tests.forEach(testInfo => {
        const testIqcRecords = (state.monitoringData.iqcRecords || []).filter(r => r.test === testInfo.test && parseInt(r.year) === selectedYear);
        
        let latestTarget = 0;
        const allRecordsForTest = state.monitoringData.records.filter(r => r.test === testInfo.test);
        if (allRecordsForTest.length > 0) {
          const sortedRecords = [...allRecordsForTest].sort((a, b) => b.timestamp - a.timestamp);
          const latestRecord = sortedRecords.find(r => r.target !== null && r.target !== '');
          if (latestRecord) latestTarget = parseFloat(latestRecord.target);
        }
        const finalTEa = parseTEa(testInfo.tea, latestTarget);
        const finalControlLimit = parseControlLimit(testInfo.controlLimit, finalTEa);
        
        testIqcRecords.forEach(r => {
          const checkLevels = lvl === 'ALL' ? [1, 2, 3] : [lvl];
          checkLevels.forEach(l => {
             let cvRaw = r[`cv${l}`];
             if (cvRaw !== null && cvRaw !== '' && !isNaN(parseFloat(cvRaw))) {
               totalCV++;
               if (parseFloat(cvRaw) <= finalControlLimit) {
                 compliantCV++;
               }
             }
          });
        });
      });
    }
    
    const passPercent = totalCV > 0 ? (compliantCV / totalCV) * 100 : 0;
    const el = document.getElementById('monitoringPrecisionPassPercent');

    const testInfo = state.monitoringData.tests.find(t => t.test === selectedTest) || {};
    const allRecordsForTest = state.monitoringData.records.filter(r => r.test === selectedTest);
    const recordsForYear = allRecordsForTest.filter(r => new Date(r.timestamp).getFullYear() === selectedYear);
    
    let latestTarget = 0;
    if (allRecordsForTest.length > 0) {
      const sortedRecords = [...allRecordsForTest].sort((a, b) => b.timestamp - a.timestamp);
      const latestRecord = sortedRecords.find(r => r.target !== null && r.target !== '');
      if (latestRecord) latestTarget = parseFloat(latestRecord.target);
    }

    const finalTEa = parseTEa(testInfo.tea, latestTarget);
    const finalControlLimit = parseControlLimit(testInfo.controlLimit, finalTEa);

    const monthlyBias = new Array(12).fill(null);
    recordsForYear.forEach(r => {
      if (r.result !== null && r.result !== '' && r.bias !== null && r.bias !== '') {
        const m = new Date(r.timestamp).getMonth(); 
        monthlyBias[m] = Math.abs(parseFloat(r.bias)); 
      }
    });

    const labels = ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.', 'ก.ค.', 'ส.ค.', 'ก.ย.', 'ต.ค.', 'พ.ย.', 'ธ.ค.'];
    const controlLimitData = new Array(12).fill(finalControlLimit);

    const validBiases = monthlyBias.filter(b => b !== null && !isNaN(b));
    let maxBias = validBiases.length > 0 ? Math.max(...validBiases) : 0;
    let yMaxLimit = undefined; 
    
    if (maxBias > finalControlLimit * 2.5) {
        yMaxLimit = finalControlLimit * 2.5;
    }

    if (state.accuracyChart) {
      state.accuracyChart.destroy();
      state.accuracyChart = null;
    }

    recreateCanvas('accuracyChartCanvas');
    const ctx = document.getElementById('accuracyChartCanvas').getContext('2d');

    state.accuracyChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          {
            label: 'เกณฑ์ควบคุม (Control Limit)',
            data: controlLimitData,
            borderColor: '#ef4444', 
            borderWidth: 2,
            borderDash: [5, 5],
            pointRadius: 0,
            fill: false,
            tension: 0
          },
          {
            label: 'Absolute %Bias',
            data: monthlyBias,
            segment: {
                borderColor: context => (context.p0.parsed.y > finalControlLimit || context.p1.parsed.y > finalControlLimit) ? '#ef4444' : '#3b82f6',
            },
            backgroundColor: function(context) {
                const chart = context.chart;
                const {ctx: canvasCtx, chartArea, scales} = chart;
                if (!chartArea) return 'rgba(59, 130, 246, 0.1)';
                
                const yLimitPixel = scales.y.getPixelForValue(finalControlLimit);
                const top = chartArea.top;
                const bottom = chartArea.bottom;
                
                let gradient = canvasCtx.createLinearGradient(0, top, 0, bottom);
                let offset = (yLimitPixel - top) / (bottom - top);
                offset = Math.max(0, Math.min(1, offset)); 
                
                gradient.addColorStop(0, 'rgba(239, 68, 68, 0.25)'); 
                gradient.addColorStop(offset, 'rgba(239, 68, 68, 0.25)');
                gradient.addColorStop(offset, 'rgba(59, 130, 246, 0.1)'); 
                gradient.addColorStop(1, 'rgba(59, 130, 246, 0.1)');
                
                return gradient;
            },
            borderWidth: 3,
            pointBackgroundColor: context => context.raw > finalControlLimit ? '#ef4444' : '#3b82f6',
            pointBorderColor: '#ffffff', 
            pointBorderWidth: 1.5,
            pointRadius: 5,
            pointHoverRadius: 7,
            fill: true,
            tension: 0.3,
            spanGaps: true 
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false }, 
          tooltip: {
            backgroundColor: 'rgba(255, 255, 255, 0.95)',
            titleColor: '#1e293b',
            bodyColor: '#475569',
            borderColor: '#e2e8f0',
            borderWidth: 1,
            padding: 12,
            boxPadding: 6,
            usePointStyle: true,
            callbacks: {
              label: function(context) {
                let label = context.dataset.label || '';
                if (label) label += ': ';
                if (context.parsed.y !== null) {
                  label += context.parsed.y.toFixed(2);
                  if (context.datasetIndex === 1 && context.parsed.y > finalControlLimit) {
                     label += ' (out)';
                  } else if (context.datasetIndex === 1) {
                     label += ' (in)';
                  }
                }
                return label;
              }
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            max: yMaxLimit, 
            grid: { color: 'rgba(226, 232, 240, 0.6)', borderDash: [4, 4] },
            ticks: { font: { family: 'Prompt' }, color: '#64748b' }
          },
          x: {
            grid: { display: false },
            ticks: { font: { family: 'Prompt' }, color: '#64748b' }
          }
        },
        interaction: { intersect: false, mode: 'index' }
      }
    });
  }

    if (!selectedTest) {
      document.getElementById('precisionChartCanvas').classList.add('hidden');
      document.getElementById('precisionChartEmpty').classList.remove('hidden');
      document.getElementById('precisionGraphLegend').classList.add('hidden');
      return;
    }

    document.getElementById('precisionChartCanvas').classList.remove('hidden');
    document.getElementById('precisionChartEmpty').classList.add('hidden');
    document.getElementById('precisionGraphLegend').classList.remove('hidden');

    const testInfo = state.monitoringData.tests.find(t => t.test === selectedTest) || {};
    const allRecordsForTest = state.monitoringData.records.filter(r => r.test === selectedTest);
    
    let latestTarget = 0;

      const sortedRecords = [...allRecordsForTest].sort((a, b) => b.timestamp - a.timestamp);
      const latestRecord = sortedRecords.find(r => r.target !== null && r.target !== '');
      if (latestRecord) latestTarget = parseFloat(latestRecord.target);
    }

    const finalTEa = parseTEa(testInfo.tea, latestTarget);
    const finalControlLimit = parseControlLimit(testInfo.controlLimit, finalTEa);

    const testIqcRecords = (state.monitoringData.iqcRecords || []).filter(r => r.test === selectedTest && parseInt(r.year) === selectedYear);

        pointRadius: 0,
        fill: false,
        tension: 0

    ];

    const lvl = state.currentPreLevelFilter;
    let allMaxCV = 0;

    const levelsToDraw = lvl === 'ALL' ? [1, 2, 3] : [lvl];
    
    levelsToDraw.forEach(l => {
       const monthlyCV = new Array(12).fill(null);
       testIqcRecords.forEach(r => {
          const mIdx = parseInt(r.month) - 1; 
          let cvRaw = r[`cv${l}`];
          if (mIdx >= 0 && mIdx <= 11 && cvRaw !== null && cvRaw !== '' && !isNaN(parseFloat(cvRaw))) {
             const cvVal = parseFloat(cvRaw);
             monthlyCV[mIdx] = cvVal;
             if (cvVal > allMaxCV) allMaxCV = cvVal;
          }
       });
       
       let dynamicLineColor = '#6366f1'; 
       if (l === 1) dynamicLineColor = '#3b82f6';
       else if (l === 2) dynamicLineColor = '#10b981';
       else if (l === 3) dynamicLineColor = '#a855f7';

       else if (l === 2) rgbBaseColor = '16, 185, 129';
       else if (l === 3) rgbBaseColor = '168, 85, 247';

       const isFill = lvl !== 'ALL';

       datasets.push({
          label: `Level ${l} %CV`,
          data: monthlyCV,
          segment: {
            borderColor: context => (context.p0.parsed.y > finalControlLimit || context.p1.parsed.y > finalControlLimit) ? '#ef4444' : dynamicLineColor,
          },
          backgroundColor: isFill ? function(context) {
              const chart = context.chart;
              const {ctx: canvasCtx, chartArea, scales} = chart;
              if (!chartArea) return `rgba(${rgbBaseColor}, 0.1)`; 
              
              const yLimitPixel = scales.y.getPixelForValue(finalControlLimit);
              const top = chartArea.top;
              const bottom = chartArea.bottom;
              
              let gradient = canvasCtx.createLinearGradient(0, top, 0, bottom);
              let offset = (yLimitPixel - top) / (bottom - top);
              offset = Math.max(0, Math.min(1, offset)); 
              
              gradient.addColorStop(0, 'rgba(239, 68, 68, 0.25)'); 
              gradient.addColorStop(offset, 'rgba(239, 68, 68, 0.25)');
              gradient.addColorStop(offset, `rgba(${rgbBaseColor}, 0.1)`); 
              gradient.addColorStop(1, `rgba(${rgbBaseColor}, 0.1)`);
              
              return gradient;
          } : 'transparent',
          borderWidth: isFill ? 3 : 2,
          pointBackgroundColor: context => context.raw > finalControlLimit ? '#ef4444' : dynamicLineColor,
          pointBorderColor: '#ffffff',
          pointRadius: 5,
          pointHoverRadius: 7,
          fill: isFill,

        </div>

    if (lvl === 'ALL') {
       legendHtml += `
          <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full inline-block bg-blue-500"></span> L1</div>
          <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full inline-block bg-emerald-500"></span> L2</div>
          <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full inline-block bg-purple-500"></span> L3</div>
       `;
    } else {
       let dynamicLineColor = '#6366f1'; 
       if (lvl === 1) dynamicLineColor = '#3b82f6';
       else if (lvl === 2) dynamicLineColor = '#10b981';
       else if (lvl === 3) dynamicLineColor = '#a855f7';
       legendHtml += `
          <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full inline-block" style="background-color: ${dynamicLineColor};"></span> Level ${lvl} %CV (ในเกณฑ์)</div>
          <div class="flex items-center gap-2"><span class="w-3 h-3 bg-red-500 rounded-full inline-block"></span> Level ${lvl} %CV (ออกนอกเกณฑ์)</div>
       `;
    }
    document.getElementById('precisionGraphLegend').innerHTML = legendHtml;

    let yMaxLimit = undefined; 
    if (allMaxCV > finalControlLimit * 2.5) {
        yMaxLimit = finalControlLimit * 2.5;
    }

    if (state.precisionChart) {
      state.precisionChart.destroy();
      state.precisionChart = null;
    }

    recreateCanvas('precisionChartCanvas');
    const ctx = document.getElementById('precisionChartCanvas').getContext('2d');

    state.precisionChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: datasets
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false }, 
          tooltip: {
            backgroundColor: 'rgba(255, 255, 255, 0.95)',
            titleColor: '#1e293b',
            bodyColor: '#475569',
            borderColor: '#e2e8f0',
            borderWidth: 1,
            padding: 10,
            usePointStyle: true,
            callbacks: {
              label: function(context) {
                let label = context.dataset.label || '';
                if (label) label += ': ';
                if (context.parsed.y !== null) {
                  label += context.parsed.y.toFixed(2);
                  if (context.datasetIndex > 0 && context.parsed.y > finalControlLimit) {
                     label += ' (ออกนอกเกณฑ์)';
                  }
                }
                return label;
              }
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true,
            max: yMaxLimit, 
            grid: { color: 'rgba(226, 232, 240, 0.6)', borderDash: [4, 4] },
            ticks: { font: { family: 'Prompt' }, color: '#64748b' }
          },
          x: {
            grid: { display: false },

  function loadDashboardStats() {

       buildDashboardUI();
    } else {
       loadAllDepartmentDataCore(false);

  function buildDashboardUI() {
    if (!state.dashboardStats) return;

    const eqaRecords = state.dashboardStats.eqaSummary || [];
    const iqcRecords = state.dashboardStats.iqcSummary || [];

    const yearsSet = new Set();
    eqaRecords.forEach(r => { if(r.recordYear) yearsSet.add(normalizeYear(r.recordYear)); });
    iqcRecords.forEach(r => { if(r.year) yearsSet.add(normalizeYear(r.year)); });
    
    const uniqueYears = Array.from(yearsSet).sort((a,b) => b - a);
    const yrSelect = document.getElementById('dashboardYearSelect');
    
    const previousSelected = yrSelect.value;
    yrSelect.innerHTML = '<option value="ALL">ทุกปี</option>';
    uniqueYears.forEach(y => {
      yrSelect.insertAdjacentHTML('beforeend', `<option value="${y}">${y}</option>`);
    });
    
    if (uniqueYears.includes(previousSelected) || previousSelected === 'ALL') {
      yrSelect.value = previousSelected;
    }
    const selectedYear = yrSelect.value;

    const eqaFilterSelect = document.getElementById('dashboardEqaFilterSelect');
    const eqaNamesSet = new Set();
    eqaRecords.forEach(r => { if (r.eqaName) eqaNamesSet.add(r.eqaName); });
    const prevEqaSelected = eqaFilterSelect.value;
    eqaFilterSelect.innerHTML = '<option value="ALL">ทุกรายการ</option>';
    Array.from(eqaNamesSet).sort().forEach(name => {
      eqaFilterSelect.insertAdjacentHTML('beforeend', `<option value="${name}">${name}</option>`);
    });
    if (eqaNamesSet.has(prevEqaSelected) || prevEqaSelected === 'ALL') {
      eqaFilterSelect.value = prevEqaSelected;
    }
    const selectedEqa = eqaFilterSelect.value;

    const iqcFilterSelect = document.getElementById('dashboardIqcFilterSelect');
    const iqcNamesSet = new Set();
    iqcRecords.forEach(r => { if (r.iqcName) iqcNamesSet.add(r.iqcName); });
    const prevIqcSelected = iqcFilterSelect.value;
    iqcFilterSelect.innerHTML = '<option value="ALL">ทุกรายการ</option>';
    Array.from(iqcNamesSet).sort().forEach(name => {
      iqcFilterSelect.insertAdjacentHTML('beforeend', `<option value="${name}">${name}</option>`);
    });
    if (iqcNamesSet.has(prevIqcSelected) || prevIqcSelected === 'ALL') {
      iqcFilterSelect.value = prevIqcSelected;
    }
    const selectedIqc = iqcFilterSelect.value;

    let filteredEqa = eqaRecords;
    if (selectedYear !== 'ALL') {
      filteredEqa = filteredEqa.filter(r => normalizeYear(r.recordYear) === selectedYear);
    }
    if (selectedEqa !== 'ALL') {
      filteredEqa = filteredEqa.filter(r => r.eqaName === selectedEqa);
    }

    let filteredIqc = iqcRecords;
    if (selectedYear !== 'ALL') {
      filteredIqc = filteredIqc.filter(r => normalizeYear(r.year) === selectedYear);
    }
    if (selectedIqc !== 'ALL') {
      filteredIqc = filteredIqc.filter(r => r.iqcName === selectedIqc);
    }

    // 1. คำนวณอัตราความคงเสถียร IQC
    let iqcCvCompliantPercent = 0;
    let totalCvChecked = 0;
    let compliantCvCount = 0;

    if (filteredIqc.length > 0 && state.monitoringData && state.monitoringData.tests) {
      filteredIqc.forEach(iqcItem => {
        const testMeta = state.monitoringData.tests.find(t => t.test === iqcItem.test);
        if (testMeta) {
          let latestTarget = 0;
          const allRecordsForTest = state.monitoringData.records.filter(r => r.test === iqcItem.test);
          if (allRecordsForTest.length > 0) {
            const sortedRecords = [...allRecordsForTest].sort((a, b) => b.timestamp - a.timestamp);
            const latestRecord = sortedRecords.find(r => r.target !== null && r.target !== '');
            if (latestRecord) latestTarget = parseFloat(latestRecord.target);
          }
          const finalTEa = parseTEa(testMeta.tea, latestTarget);
          const finalControlLimit = parseControlLimit(testMeta.controlLimit, finalTEa);

          [iqcItem.cv1, iqcItem.cv2, iqcItem.cv3].forEach(cv => {
            if (cv !== null && cv !== '' && !isNaN(parseFloat(cv))) {
              totalCvChecked++;
              if (parseFloat(cv) <= finalControlLimit) {
                compliantCvCount++;
              }
            }
          });
        }
      });
      iqcCvCompliantPercent = totalCvChecked > 0 ? (compliantCvCount / totalCvChecked) * 100 : 0;
    }
    document.getElementById('statIqcPrecision').textContent = `${iqcCvCompliantPercent.toFixed(1)}%`;
    setTimeout(() => { document.getElementById('barIqcPrecision').style.width = `${iqcCvCompliantPercent}%`; }, 100);
    document.getElementById('statIqcPrecisionDetail').textContent = `${compliantCvCount}/${totalCvChecked}`;

    // 2. คำนวณอัตรา EQA แบบบูรณาการใหม่ 
    let avgParticipation = 0;
    let totalExpectedTests = 0;
    let totalAnsweredTests = 0;
    if (filteredEqa.length > 0) {
      filteredEqa.forEach(r => {
        totalExpectedTests += (r.totalTests || 1); 
        totalAnsweredTests += (r.answeredCount || 0);
      });
      avgParticipation = totalExpectedTests > 0 ? (totalAnsweredTests / totalExpectedTests) * 100 : 0;
    }
    
    let avgPassRate = 0;
    let totalPassTests = 0;
    if (filteredEqa.length > 0) {
      filteredEqa.forEach(r => {
        totalPassTests += (r.acceptableCount || 0);
      });
      avgPassRate = totalExpectedTests > 0 ? (totalPassTests / totalExpectedTests) * 100 : 0;
    }

    // ประมวลผล %Bias เข้าเกณฑ์ควบคุมเพื่อเป็นตัวเลขหลักของการ์ด EQA
    let totalBiasChecked = 0;
    let compliantBiasCount = 0;
    if (state.monitoringData && state.monitoringData.records && state.monitoringData.tests) {
      const yearFilteredRecords = selectedYear === 'ALL' 
        ? state.monitoringData.records 
        : state.monitoringData.records.filter(r => new Date(r.timestamp).getFullYear() === parseInt(selectedYear));
        
      state.monitoringData.tests.forEach(testInfo => {
         if (selectedEqa !== 'ALL' && testInfo.eqaShortName !== selectedEqa) return;

         const testRecordsForYear = yearFilteredRecords.filter(r => r.test === testInfo.test);
         if (testRecordsForYear.length > 0) {
            let latestTarget = 0;
            const allRecordsForTest = state.monitoringData.records.filter(r => r.test === testInfo.test);
            if (allRecordsForTest.length > 0) {
               const sortedRecords = [...allRecordsForTest].sort((a, b) => b.timestamp - a.timestamp);
               const latestRecord = sortedRecords.find(r => r.target !== null && r.target !== '');
               if (latestRecord) latestTarget = parseFloat(latestRecord.target);
            }
            const finalTEa = parseTEa(testInfo.tea, latestTarget);
            const finalControlLimit = parseControlLimit(testInfo.controlLimit, finalTEa);

            testRecordsForYear.forEach(r => {
               if (r.result !== null && r.result !== '' && r.bias !== null && r.bias !== '') {
                  totalBiasChecked++;
                  if (Math.abs(parseFloat(r.bias)) <= finalControlLimit) {
                     compliantBiasCount++;
                  }
               }
            });
         }
      });
    }
    const biasCompliancePercent = totalBiasChecked > 0 ? (compliantBiasCount / totalBiasChecked) * 100 : 0;

    document.getElementById('statEqaPassRate').textContent = `${biasCompliancePercent.toFixed(1)}%`;
    document.getElementById('statEqaPassDetail').textContent = `${compliantBiasCount}/${totalBiasChecked}`;

    document.getElementById('labelEqaParticipation').textContent = `${avgParticipation.toFixed(1)}%`;
    document.getElementById('labelEqaPartFraction').textContent = `(${totalAnsweredTests}/${totalExpectedTests})`;
    setTimeout(() => { document.getElementById('barEqaParticipation').style.width = `${avgParticipation}%`; }, 100);
    
    document.getElementById('labelEqaPassRate').textContent = `${avgPassRate.toFixed(1)}%`;
    document.getElementById('labelEqaPassFraction').textContent = `(${totalPassTests}/${totalExpectedTests})`;
    setTimeout(() => { document.getElementById('barEqaPassRate').style.width = `${avgPassRate}%`; }, 100);

    // 3. คำนวณข้อมูลรายการทดสอบ IQC/EQA ความครอบคลุม (MetaData)
    let totalMetaTests = 0;
    let testsWithIqc = 0;
    let testsWithEqa = 0;

    if (state.dashboardStats && state.dashboardStats.metadata) {
      const metaList = state.dashboardStats.metadata;
      totalMetaTests = metaList.length;
      metaList.forEach(m => {
        if (m.iqcCheck === 'มี') testsWithIqc++;
        if (m.eqaCheck === 'มี') testsWithEqa++;
      });
    }

    const pctWithIqc = totalMetaTests > 0 ? (testsWithIqc / totalMetaTests) * 100 : 0;
    const pctWithEqa = totalMetaTests > 0 ? (testsWithEqa / totalMetaTests) * 100 : 0;

    document.getElementById('statTotalTests').textContent = `${totalMetaTests} รายการ`;
    document.getElementById('statTestIqcCheck').innerHTML = `<b>${testsWithIqc}/${totalMetaTests} (${pctWithIqc.toFixed(1)}%)</b>`;
    document.getElementById('statTestEqaCheck').innerHTML = `<b>${testsWithEqa}/${totalMetaTests} (${pctWithEqa.toFixed(1)}%)</b>`;

    renderDashboardChart(selectedYear, filteredEqa, filteredIqc);
    renderTop5List(selectedYear);
  }
